<div class="toast {{#if variant}}toast-{{variant}}{{/if}}"
     x-data="{ visible: false, timer: null }"
     x-init="$nextTick(() => { visible = true; {{#if autoDismiss}}timer = setTimeout(() => visible = false, {{#if delay}}{{delay}}{{else}}5000{{/if}}){{/if}} })"
     x-show="visible"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 translate-x-full"
     x-transition:enter-end="opacity-100 translate-x-0"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100 translate-x-0"
     x-transition:leave-end="opacity-0 translate-x-full"
     :class="{ 'show': visible }">
  <div class="toast-header">
    <span class="toast-icon"></span>
    <span class="toast-title">{{title}}</span>
    {{#if time}}<span class="toast-time">{{time}}</span>{{/if}}
    <button class="toast-close" @click="visible = false; clearTimeout(timer)">
      <i data-lucide="x" class="w-3.5 h-3.5"></i>
    </button>
  </div>
  <div class="toast-body">
    {{{message}}}
  </div>
</div>
