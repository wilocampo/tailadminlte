<!-- Modal: use x-data="{ modalOpen: false }" on a parent, and @click="modalOpen = true" to trigger -->
<template x-teleport="body">
  <div x-show="modalOpen"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="fixed inset-0 z-[9998] flex items-center justify-center p-4"
       @keydown.escape.window="modalOpen = false"
       style="display: none;">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/50" @click="modalOpen = false"></div>
    <!-- Modal panel -->
    <div x-show="modalOpen"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         class="relative w-full {{#if size}}{{size}}{{else}}max-w-lg{{/if}} bg-white dark:bg-gray-800 rounded-lg shadow-xl z-[9999]"
         @click.stop>
      <!-- Header -->
      <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">{{title}}</h3>
        <button @click="modalOpen = false" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <!-- Body -->
      <div class="p-4">
        {{{body}}}
      </div>
      <!-- Footer -->
      {{#if footer}}
      <div class="flex items-center justify-end gap-2 p-4 border-t border-gray-200 dark:border-gray-700">
        {{{footer}}}
      </div>
      {{/if}}
    </div>
  </div>
</template>
