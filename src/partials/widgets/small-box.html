<div class="small-box {{bgColor}}">
  <div class="inner">
    <h3>{{{value}}}</h3>
    <p>{{label}}</p>
  </div>
  <div class="small-box-icon">
    <i data-lucide="{{icon}}"></i>
  </div>
  <a href="{{#if link}}{{link}}{{else}}#{{/if}}" class="small-box-footer">
    More info <i data-lucide="arrow-right" class="inline w-4 h-4"></i>
  </a>
</div>
