<!doctype html>
<html lang="en">
<head>
  {{> head title="TailAdminLTE | 404 Not Found" pathPrefix="../.."}}
</head>
<body class="bg-gray-100 dark:bg-gray-900 font-sans text-gray-800 dark:text-gray-200" x-data>
  {{> ui/dark-mode-toggle}}

  <div class="error-page-wrapper">
    <div class="error-page-content">

      <div class="error-code">404</div>
      <div class="error-title">Oops! Page not found.</div>
      <div class="error-description">
        We could not find the page you were looking for.
        Meanwhile, you may <a href="/pages/index.html" class="text-[var(--color-primary)] hover:underline">return to the dashboard</a>
        or try searching for the page.
      </div>

      <!-- Search -->
      <form class="error-search" onsubmit="return false;">
        <input type="text" placeholder="Search...">
        <button type="submit">
          <i data-lucide="search" class="w-4 h-4"></i>
        </button>
      </form>

      <a href="/pages/index.html" class="error-home-link">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        Back to Dashboard
      </a>

    </div>
  </div>

  {{> scripts pathPrefix="../.."}}
</body>
</html>
