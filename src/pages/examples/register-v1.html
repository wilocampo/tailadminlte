<!doctype html>
<html lang="en">
<head>
  {{> head title="TailAdminLTE | Register" pathPrefix="../.."}}
</head>
<body class="bg-gray-100 dark:bg-gray-900 font-sans text-gray-800 dark:text-gray-200" x-data>
  {{> ui/dark-mode-toggle}}

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-card-body">

        <!-- Logo -->
        <div class="auth-logo">
          <a href="/pages/index.html"><span>Tail</span>AdminLTE</a>
          <p>Register a new membership</p>
        </div>

        <!-- Register Form -->
        <form>
          <div class="auth-input-group">
            <label for="regName" class="sr-only">Full Name</label>
            <input id="regName" type="text" placeholder="Full Name" autocomplete="name">
            <span class="auth-input-icon">
              <i data-lucide="user" class="w-4 h-4"></i>
            </span>
          </div>

          <div class="auth-input-group">
            <label for="regEmail" class="sr-only">Email</label>
            <input id="regEmail" type="email" placeholder="Email" autocomplete="email">
            <span class="auth-input-icon">
              <i data-lucide="mail" class="w-4 h-4"></i>
            </span>
          </div>

          <div class="auth-input-group">
            <label for="regPassword" class="sr-only">Password</label>
            <input id="regPassword" type="password" placeholder="Password" autocomplete="new-password">
            <span class="auth-input-icon">
              <i data-lucide="lock" class="w-4 h-4"></i>
            </span>
          </div>

          <div class="auth-input-group">
            <label for="regConfirm" class="sr-only">Confirm Password</label>
            <input id="regConfirm" type="password" placeholder="Confirm Password" autocomplete="new-password">
            <span class="auth-input-icon">
              <i data-lucide="lock" class="w-4 h-4"></i>
            </span>
          </div>

          <div class="auth-terms">
            <input type="checkbox" id="terms">
            <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
          </div>

          <button type="submit" class="auth-btn auth-btn-primary">
            Register <i data-lucide="user-plus" class="w-4 h-4"></i>
          </button>
        </form>

        <!-- Social Login -->
        <div class="auth-divider">OR</div>

        <div class="auth-social-buttons">
          <a href="#" class="auth-social-btn btn-facebook" title="Sign up with Facebook">f</a>
          <a href="#" class="auth-social-btn btn-google" title="Sign up with Google">G+</a>
          <a href="#" class="auth-social-btn btn-github" title="Sign up with GitHub">
            <i data-lucide="github" class="w-4 h-4"></i>
          </a>
        </div>

        <!-- Links -->
        <div class="auth-links">
          <p><a href="/pages/examples/login-v1.html">I already have a membership</a></p>
        </div>

      </div>
    </div>
  </div>

  {{> scripts pathPrefix="../.."}}
</body>
</html>
