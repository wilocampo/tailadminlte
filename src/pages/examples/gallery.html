<!doctype html>
<html lang="en">
<head>
  {{> head title="TailAdminLTE | Gallery" pathPrefix="../.."}}
</head>
<body class="layout-fixed sidebar-expand-lg sidebar-mini sidebar-open bg-gray-100 dark:bg-gray-900 font-sans text-gray-800 dark:text-gray-200" x-data>
  <div class="app-wrapper">
    {{> header/navbar}}
    {{> sidebar/sidebar activePage="examples-gallery"}}
    <main class="app-main">
      {{> content/content-header pageTitle="Gallery"}}
      <div class="app-content">
        <div class="w-full px-4" x-data="{
          filter: 'all',
          lightbox: false,
          currentImage: '',
          currentTitle: '',
          images: [
            { src: '/assets/img/photo1.png', title: 'Mountain Sunrise', category: 'nature', desc: 'Beautiful sunrise over the mountains' },
            { src: '/assets/img/photo2.png', title: 'City Skyline', category: 'urban', desc: 'Modern city skyline at dusk' },
            { src: '/assets/img/photo3.jpg', title: 'Forest Path', category: 'nature', desc: 'A winding path through autumn forest' },
            { src: '/assets/img/photo4.jpg', title: 'Abstract Art', category: 'art', desc: 'Colorful abstract digital artwork' },
            { src: '/assets/img/prod-1.jpg', title: 'Product Showcase', category: 'products', desc: 'Featured product photography' },
            { src: '/assets/img/prod-2.jpg', title: 'Tech Gadget', category: 'products', desc: 'Latest tech gadget close-up' },
            { src: '/assets/img/prod-3.jpg', title: 'Office Space', category: 'urban', desc: 'Modern workspace design' },
            { src: '/assets/img/prod-4.jpg', title: 'Creative Design', category: 'art', desc: 'Minimalist creative design' },
            { src: '/assets/img/prod-5.jpg', title: 'Nature Reserve', category: 'nature', desc: 'Peaceful nature reserve landscape' },
            { src: '/assets/img/boxed-bg.jpg', title: 'Texture Pattern', category: 'art', desc: 'Seamless texture pattern background' },
            { src: '/assets/img/photo1.png', title: 'Lakeside View', category: 'nature', desc: 'Calm lake reflecting the sky' },
            { src: '/assets/img/photo2.png', title: 'Downtown Night', category: 'urban', desc: 'City lights at night' }
          ],
          openLightbox(img) {
            this.currentImage = img.src;
            this.currentTitle = img.title;
            this.lightbox = true;
          }
        }">

          <!-- Filter Buttons -->
          <div class="flex flex-wrap gap-2 mb-6">
            <button @click="filter = 'all'" :class="filter === 'all' ? 'bg-blue-600 text-white' : 'bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'" class="px-4 py-2 text-sm rounded transition font-medium">All</button>
            <button @click="filter = 'nature'" :class="filter === 'nature' ? 'bg-blue-600 text-white' : 'bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'" class="px-4 py-2 text-sm rounded transition font-medium">Nature</button>
            <button @click="filter = 'urban'" :class="filter === 'urban' ? 'bg-blue-600 text-white' : 'bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'" class="px-4 py-2 text-sm rounded transition font-medium">Urban</button>
            <button @click="filter = 'art'" :class="filter === 'art' ? 'bg-blue-600 text-white' : 'bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'" class="px-4 py-2 text-sm rounded transition font-medium">Art</button>
            <button @click="filter = 'products'" :class="filter === 'products' ? 'bg-blue-600 text-white' : 'bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'" class="px-4 py-2 text-sm rounded transition font-medium">Products</button>
          </div>

          <!-- Gallery Grid -->
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mb-6">
            <template x-for="(img, index) in images" :key="index">
              <div x-show="filter === 'all' || filter === img.category"
                   x-transition:enter="transition ease-out duration-200"
                   x-transition:enter-start="opacity-0 scale-95"
                   x-transition:enter-end="opacity-100 scale-100"
                   class="card overflow-hidden group cursor-pointer"
                   @click="openLightbox(img)">
                <div class="relative aspect-[4/3] overflow-hidden">
                  <img :src="img.src" :alt="img.title" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110">
                  <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
                    <div>
                      <h4 class="text-white font-semibold text-sm" x-text="img.title"></h4>
                      <p class="text-white/70 text-xs" x-text="img.desc"></p>
                    </div>
                  </div>
                </div>
                <div class="p-3">
                  <h4 class="text-sm font-medium truncate" x-text="img.title"></h4>
                  <span class="text-xs text-gray-500 dark:text-gray-400 capitalize" x-text="img.category"></span>
                </div>
              </div>
            </template>
          </div>

          <!-- Lightbox Modal -->
          <div x-show="lightbox" x-cloak
               x-transition:enter="transition ease-out duration-200"
               x-transition:enter-start="opacity-0"
               x-transition:enter-end="opacity-100"
               x-transition:leave="transition ease-in duration-150"
               x-transition:leave-start="opacity-100"
               x-transition:leave-end="opacity-0"
               class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4"
               @click.self="lightbox = false"
               @keydown.escape.window="lightbox = false">
            <div class="relative max-w-4xl w-full">
              <button @click="lightbox = false" class="absolute -top-10 right-0 text-white hover:text-gray-300 transition">
                <i data-lucide="x" class="w-6 h-6"></i>
              </button>
              <img :src="currentImage" :alt="currentTitle" class="w-full max-h-[80vh] object-contain rounded-lg">
              <p class="text-white text-center mt-3 font-medium" x-text="currentTitle"></p>
            </div>
          </div>

        </div>
      </div>
    </main>
    {{> footer/footer}}
  </div>
  {{> scripts pathPrefix="../.."}}
</body>
</html>
