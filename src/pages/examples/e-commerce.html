<!doctype html>
<html lang="en">
<head>
  {{> head title="TailAdminLTE | E-Commerce" pathPrefix="../.."}}
</head>
<body class="layout-fixed sidebar-expand-lg sidebar-mini sidebar-open bg-gray-100 dark:bg-gray-900 font-sans text-gray-800 dark:text-gray-200" x-data>
  <div class="app-wrapper">
    {{> header/navbar}}
    {{> sidebar/sidebar activePage="examples-ecommerce"}}
    <main class="app-main" role="main">
      {{> content/content-header pageTitle="E-Commerce"}}
      <div class="app-content">
        <div class="w-full px-4" x-data="{
          view: 'grid',
          sortBy: 'name',
          showFilters: true,
          priceRange: [0, 500],
          selectedCategories: [],
          minRating: 0,
          products: [
            { name: 'Wireless Bluetooth Headphones', price: 79.99, rating: 4.5, reviews: 128, category: 'electronics', image: '/assets/img/prod-1.jpg', badge: 'Sale' },
            { name: 'Premium Leather Backpack', price: 129.99, rating: 4.8, reviews: 89, category: 'accessories', image: '/assets/img/prod-2.jpg', badge: '' },
            { name: 'Smart Fitness Watch', price: 199.99, rating: 4.3, reviews: 256, category: 'electronics', image: '/assets/img/prod-3.jpg', badge: 'New' },
            { name: 'Organic Cotton T-Shirt', price: 34.99, rating: 4.6, reviews: 412, category: 'clothing', image: '/assets/img/prod-4.jpg', badge: '' },
            { name: 'Mechanical Keyboard RGB', price: 149.99, rating: 4.7, reviews: 67, category: 'electronics', image: '/assets/img/prod-5.jpg', badge: 'Hot' },
            { name: 'Canvas Sneakers', price: 59.99, rating: 4.2, reviews: 183, category: 'clothing', image: '/assets/img/prod-1.jpg', badge: 'Sale' },
            { name: 'Stainless Steel Water Bottle', price: 24.99, rating: 4.9, reviews: 534, category: 'accessories', image: '/assets/img/prod-2.jpg', badge: '' },
            { name: 'Wireless Charging Pad', price: 39.99, rating: 4.4, reviews: 301, category: 'electronics', image: '/assets/img/prod-3.jpg', badge: '' }
          ],
          sorted() {
            let list = [...this.products];
            if (this.selectedCategories.length > 0) {
              list = list.filter(p => this.selectedCategories.includes(p.category));
            }
            if (this.minRating > 0) {
              list = list.filter(p => p.rating >= this.minRating);
            }
            if (this.sortBy === 'price-asc') list.sort((a, b) => a.price - b.price);
            else if (this.sortBy === 'price-desc') list.sort((a, b) => b.price - a.price);
            else if (this.sortBy === 'rating') list.sort((a, b) => b.rating - a.rating);
            else if (this.sortBy === 'popularity') list.sort((a, b) => b.reviews - a.reviews);
            else list.sort((a, b) => a.name.localeCompare(b.name));
            return list;
          },
          stars(rating) {
            return Array.from({length: 5}, (_, i) => i < Math.floor(rating) ? 'full' : (i < rating ? 'half' : 'empty'));
          },
          badgeColor(badge) {
            return badge === 'Sale' ? 'bg-red-500' : badge === 'New' ? 'bg-green-500' : badge === 'Hot' ? 'bg-orange-500' : 'bg-blue-500';
          },
          toggleCategory(cat) {
            const idx = this.selectedCategories.indexOf(cat);
            if (idx > -1) this.selectedCategories.splice(idx, 1);
            else this.selectedCategories.push(cat);
          }
        }">

          <div class="flex flex-col lg:flex-row gap-4 mb-6">

            <!-- Sidebar Filters -->
            <div class="lg:w-64 shrink-0" x-show="showFilters">
              <div class="card sticky top-4">
                <div class="card-header">
                  <h3 class="card-title">Filters</h3>
                </div>
                <div class="card-body space-y-5">

                  <!-- Category -->
                  <div>
                    <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Category</h4>
                    <label class="flex items-center gap-2 text-sm mb-1.5 cursor-pointer">
                      <input type="checkbox" value="electronics" @change="toggleCategory('electronics')" :checked="selectedCategories.includes('electronics')" class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                      Electronics
                    </label>
                    <label class="flex items-center gap-2 text-sm mb-1.5 cursor-pointer">
                      <input type="checkbox" value="clothing" @change="toggleCategory('clothing')" :checked="selectedCategories.includes('clothing')" class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                      Clothing
                    </label>
                    <label class="flex items-center gap-2 text-sm mb-1.5 cursor-pointer">
                      <input type="checkbox" value="accessories" @change="toggleCategory('accessories')" :checked="selectedCategories.includes('accessories')" class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                      Accessories
                    </label>
                  </div>

                  <!-- Rating Filter -->
                  <div>
                    <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Min Rating</h4>
                    <div class="space-y-1">
                      <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="radio" name="rating" value="0" x-model.number="minRating" class="border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500"> All
                      </label>
                      <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="radio" name="rating" value="4" x-model.number="minRating" class="border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500"> 4+ Stars
                      </label>
                      <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="radio" name="rating" value="4.5" x-model.number="minRating" class="border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500"> 4.5+ Stars
                      </label>
                    </div>
                  </div>

                  <!-- Reset -->
                  <button @click="selectedCategories = []; minRating = 0; sortBy = 'name'" class="w-full px-3 py-1.5 text-sm bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                    Reset Filters
                  </button>
                </div>
              </div>
            </div>

            <!-- Product Area -->
            <div class="flex-1">
              <!-- Toolbar -->
              <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                <div class="flex items-center gap-2">
                  <button @click="showFilters = !showFilters" class="lg:hidden px-3 py-1.5 text-sm bg-white dark:bg-gray-800 rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition inline-flex items-center gap-1">
                    <i data-lucide="sliders-horizontal" class="w-4 h-4"></i> Filters
                  </button>
                  <p class="text-sm text-gray-500 dark:text-gray-400">Showing <strong x-text="sorted().length"></strong> products</p>
                </div>
                <div class="flex items-center gap-2">
                  <select x-model="sortBy" class="px-3 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="name">Sort by Name</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="rating">Top Rated</option>
                    <option value="popularity">Most Popular</option>
                  </select>
                  <div class="flex gap-1 bg-white dark:bg-gray-800 rounded p-0.5">
                    <button @click="view = 'grid'" :class="view === 'grid' ? 'bg-blue-600 text-white' : 'text-gray-500'" class="p-1.5 rounded transition">
                      <i data-lucide="layout-grid" class="w-4 h-4"></i>
                    </button>
                    <button @click="view = 'list'" :class="view === 'list' ? 'bg-blue-600 text-white' : 'text-gray-500'" class="p-1.5 rounded transition">
                      <i data-lucide="list" class="w-4 h-4"></i>
                    </button>
                  </div>
                </div>
              </div>

              <!-- Grid View -->
              <div x-show="view === 'grid'" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
                <template x-for="(product, i) in sorted()" :key="i">
                  <div class="card overflow-hidden group">
                    <div class="relative aspect-[4/3] overflow-hidden bg-gray-100 dark:bg-gray-800">
                      <img :src="product.image" :alt="product.name" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105">
                      <template x-if="product.badge">
                        <span :class="badgeColor(product.badge)" class="absolute top-2 left-2 text-white text-xs px-2 py-0.5 rounded font-medium" x-text="product.badge"></span>
                      </template>
                    </div>
                    <div class="card-body">
                      <h4 class="font-semibold text-sm mb-1 line-clamp-1" x-text="product.name"></h4>
                      <!-- Rating -->
                      <div class="flex items-center gap-1 mb-2">
                        <div class="flex text-yellow-400">
                          <template x-for="(s, j) in stars(product.rating)" :key="j">
                            <i data-lucide="star" class="w-3.5 h-3.5" :class="s === 'full' ? 'fill-current' : s === 'half' ? 'fill-current opacity-50' : 'text-gray-300 dark:text-gray-600'"></i>
                          </template>
                        </div>
                        <span class="text-xs text-gray-400" x-text="'(' + product.reviews + ')'"></span>
                      </div>
                      <div class="flex items-center justify-between">
                        <span class="text-lg font-bold text-blue-600" x-text="'$' + product.price.toFixed(2)"></span>
                        <button class="px-3 py-1.5 bg-blue-600 text-white text-xs rounded hover:bg-blue-700 transition inline-flex items-center gap-1">
                          <i data-lucide="shopping-cart" class="w-3 h-3"></i> Add
                        </button>
                      </div>
                    </div>
                  </div>
                </template>
              </div>

              <!-- List View -->
              <div x-show="view === 'list'" x-cloak class="space-y-3">
                <template x-for="(product, i) in sorted()" :key="i">
                  <div class="card">
                    <div class="card-body flex flex-col sm:flex-row gap-4">
                      <div class="relative w-full sm:w-40 h-32 shrink-0 overflow-hidden rounded bg-gray-100 dark:bg-gray-800">
                        <img :src="product.image" :alt="product.name" class="w-full h-full object-cover">
                        <template x-if="product.badge">
                          <span :class="badgeColor(product.badge)" class="absolute top-2 left-2 text-white text-xs px-2 py-0.5 rounded font-medium" x-text="product.badge"></span>
                        </template>
                      </div>
                      <div class="flex-1">
                        <h4 class="font-semibold text-base mb-1" x-text="product.name"></h4>
                        <div class="flex items-center gap-1 mb-2">
                          <div class="flex text-yellow-400">
                            <template x-for="(s, j) in stars(product.rating)" :key="j">
                              <i data-lucide="star" class="w-3.5 h-3.5" :class="s === 'full' ? 'fill-current' : 'text-gray-300 dark:text-gray-600'"></i>
                            </template>
                          </div>
                          <span class="text-xs text-gray-400" x-text="product.rating + ' (' + product.reviews + ' reviews)'"></span>
                        </div>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mb-3">High-quality product with premium materials and excellent craftsmanship. Perfect for everyday use.</p>
                        <div class="flex items-center justify-between">
                          <span class="text-xl font-bold text-blue-600" x-text="'$' + product.price.toFixed(2)"></span>
                          <button class="px-4 py-2 bg-blue-600 text-white text-sm rounded hover:bg-blue-700 transition inline-flex items-center gap-1">
                            <i data-lucide="shopping-cart" class="w-4 h-4"></i> Add to Cart
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                </template>
              </div>

            </div>
          </div>

        </div>
      </div>
    </main>
    {{> footer/footer}}
  </div>
  {{> scripts pathPrefix="../.."}}
</body>
</html>
